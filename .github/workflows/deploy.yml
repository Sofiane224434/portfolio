# ═══════════════════════════════════════════════════════════════════════
# WORKFLOW DE DÉPLOIEMENT AUTOMATIQUE - REACT + VITE
# ═══════════════════════════════════════════════════════════════════════
name: Deploy portfolio to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            APP_DIR=~/apps/deploy-app-react
            REPO_URL=https://github.com/${{ github.repository }}.git

            echo "🌐 Vérification du réseau Docker..."
            docker network inspect web >/dev/null 2>&1 || docker network create web

            echo "📁 Préparation du dossier..."
            mkdir -p $APP_DIR
            cd $APP_DIR

            echo "📥 Récupération du code..."
            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
              git clean -fd
            else
              rm -rf $APP_DIR/*
              rm -rf $APP_DIR/.*  2>/dev/null || true
              git clone $REPO_URL .
            fi

            echo "🐳 Déploiement Docker..."
            docker compose down || true
            docker compose up -d --build

            echo "🧹 Nettoyage..."
            docker image prune -f

            echo "✅ Déploiement terminé !"
            docker ps | grep portfolio_app
